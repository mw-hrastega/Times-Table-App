name: Run Tests
on: [push]
jobs:
  my-job:
    name: Run MATLAB Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v3
        with:
          products: MATLAB_Test
      - name: Run tests
        #uses: matlab-actions/run-tests@doc-testing
        uses: matlab-actions/run-tests@v3
        with:
          #source-folder: mySource
          select-by-folder: myTests
          #code-coverage-html: code-coverage
          #code-coverage-metric-level: mcdc 
      #- name: Upload code coverage report
      #  uses: actions/upload-artifact@v7
      #  with:
      #    name: code-coverage-report
      #    path: code-coverage
